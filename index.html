<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#111827" />
    <title>Сайт временно недоступен</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #64748b;
        --line: #dbe3ea;
        --paper: #f8fafc;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background: var(--paper);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 760px);
        padding: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      }

      .mark {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        margin-bottom: 24px;
        border-radius: 8px;
        color: #ffffff;
        background: var(--accent);
        font-weight: 900;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.3rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .status-image {
        display: block;
        width: 100%;
        margin: 26px 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background: #eef2f7;
      }

      .notice {
        margin-top: 18px;
        padding: 16px 18px;
        border-left: 4px solid var(--accent);
        border-radius: 6px;
        color: var(--ink);
        background: #f1f5f9;
        font-weight: 700;
      }

      @media (max-width: 600px) {
        main {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">А+</div>
      <h1>Сайт временно недоступен</h1>
      <p>Лендинг и чат-консультант отключены. Публикация будет восстановлена после отдельного решения.</p>
      <img class="status-image" src="assets/client-silence-notice.jpg" alt="Скриншот переписки, размытый для защиты приватных данных" />
      <p class="notice">Работы приостановлены из-за отсутствия обратной связи со стороны заказчика.</p>
    </main>
  </body>
</html>
